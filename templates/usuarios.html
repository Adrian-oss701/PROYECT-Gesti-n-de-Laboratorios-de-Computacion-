<!DOCTYPE html>
<html>
<head>
  <title>Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/dashboard">← Dashboard</a>
  <span class="text-white">Usuarios</span>
</nav>
<div class="container mt-4">

  <!-- Solo admin ve el formulario -->
  <div class="card mb-4" id="adminPanel">
    <div class="card-body">
      <h6 class="card-title" id="formTitulo">Nuevo Usuario</h6>
      <input type="hidden" id="editId">
      <div class="row g-2">
        <div class="col-md-3"><input id="nombre" class="form-control" placeholder="Nombre completo"></div>
        <div class="col-md-3"><input id="correo" class="form-control" placeholder="Correo" type="email"></div>
        <div class="col-md-2"><input id="password" class="form-control" placeholder="Contraseña" type="password"></div>
        <div class="col-md-2">
          <select id="rol" class="form-select">
            <option value="ADMIN">ADMIN</option>
            <option value="DOCENTE" selected>DOCENTE</option>
            <option value="ESTUDIANTE">ESTUDIANTE</option>
            <option value="TECNICO">TECNICO</option>
          </select>
        </div>
        <div class="col-md-2 d-flex gap-1">
          <button class="btn btn-success" onclick="guardar()">Guardar</button>
          <button class="btn btn-secondary" onclick="limpiar()">Limpiar</button>
        </div>
      </div>
    </div>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Rol</th><th id="accionesHeader">Acciones</th></tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem("token");
const rol = localStorage.getItem("rol");
if (!token) window.location = "/login";

// Si no es admin, ocultar formulario y columna acciones
if (rol !== "ADMIN") {
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("accionesHeader").style.display = "none";
}

async function cargar() {
  const res = await fetch("/usuarios", {
    headers: { "Authorization": "Bearer " + token }
  });
  if (res.status === 403) {
    document.getElementById("tabla").innerHTML = '<tr><td colspan="5" class="text-danger">Sin permisos para ver usuarios</td></tr>';
    return;
  }
  const datos = await res.json();
  const esAdmin = rol === "ADMIN";
  const rolColor = { ADMIN: "danger", DOCENTE: "primary", ESTUDIANTE: "success", TECNICO: "warning text-dark" };
  let html = "";
  datos.forEach(u => {
    html += `<tr>
      <td>${u.id}</td>
      <td>${u.nombre}</td>
      <td>${u.correo}</td>
      <td><span class="badge bg-${rolColor[u.rol] || 'secondary'}">${u.rol}</span></td>
      <td>${esAdmin ? `
        <button class="btn btn-sm btn-warning me-1" onclick='editar(${JSON.stringify(u)})'>Editar</button>
        <button class="btn btn-sm btn-danger" onclick="eliminar(${u.id})">Eliminar</button>
      ` : ""}</td>
    </tr>`;
  });
  document.getElementById("tabla").innerHTML = html;
}

async function guardar() {
  const id = document.getElementById("editId").value;
  const body = {
    nombre: document.getElementById("nombre").value,
    correo: document.getElementById("correo").value,
    password: document.getElementById("password").value,
    rol: document.getElementById("rol").value
  };
  const url = id ? `/usuarios/${id}` : "/usuarios";
  const method = id ? "PUT" : "POST";
  const res = await fetch(url, {
    method,
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  alert(data.mensaje);
  limpiar();
  cargar();
}

function editar(u) {
  document.getElementById("editId").value = u.id;
  document.getElementById("nombre").value = u.nombre;
  document.getElementById("correo").value = u.correo;
  document.getElementById("password").value = "";  // no mostrar password actual
  document.getElementById("rol").value = u.rol;
  document.getElementById("formTitulo").textContent = "Editar Usuario #" + u.id;
}

async function eliminar(id) {
  if (!confirm("¿Eliminar este usuario?")) return;
  const res = await fetch(`/usuarios/${id}`, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + token }
  });
  const data = await res.json();
  alert(data.mensaje);
  cargar();
}

function limpiar() {
  ["editId", "nombre", "correo", "password"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("rol").value = "DOCENTE";
  document.getElementById("formTitulo").textContent = "Nuevo Usuario";
}

cargar();
</script>
</body>
</html>
