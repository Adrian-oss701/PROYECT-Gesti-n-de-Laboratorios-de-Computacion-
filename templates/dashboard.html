<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand">Gestión de Laboratorios - UMSA</span>
  <div>
    <span class="text-white me-3" id="bienvenida"></span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>
<div class="container mt-4">
  <div class="row g-3">
    <div class="col-md-4">
      <div class="card text-white bg-primary">
        <div class="card-body">
          <h5 class="card-title">Laboratorios</h5>
          <p class="card-text">Administrar laboratorios y consultar disponibilidad</p>
          <a href="/laboratorios-ver" class="btn btn-light btn-sm">Ir</a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
  <div class="card text-white bg-secondary">
    <div class="card-body">
      <h5 class="card-title">Usuarios</h5>
      <p class="card-text">Gestionar usuarios del sistema (solo admin)</p>
      <a href="/usuarios-ver" class="btn btn-light btn-sm">Ir</a>
    </div>
  </div>
</div>

    <div class="col-md-4">
      <div class="card text-white bg-success">
        <div class="card-body">
          <h5 class="card-title">Reservas</h5>
          <p class="card-text">Gestionar solicitudes de reserva por fecha</p>
          <a href="/reservas-ver" class="btn btn-light btn-sm">Ir</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-white bg-danger">
        <div class="card-body">
          <h5 class="card-title">Incidencias</h5>
          <p class="card-text">Registrar y gestionar incidencias de equipos</p>
          <a href="/incidencias-ver" class="btn btn-light btn-sm">Ir</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  const nombre = localStorage.getItem("nombre");
  const rol = localStorage.getItem("rol");
  if (!nombre) window.location = "/login";
  document.getElementById("bienvenida").textContent = nombre + " (" + rol + ")";
  function logout() {
    localStorage.clear();
    window.location = "/login";
  }
</script>
</body>
</html>
