<!DOCTYPE html>
<html>
<head>
  <title>Login - Gestión de Laboratorios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body p-4">
          <h4 class="mb-1">Sistema de Laboratorios</h4>
          <p class="text-muted mb-3">Carrera de Informática - UMSA</p>
          <div id="alerta" class="alert alert-danger d-none"></div>
          <input id="correo" class="form-control mb-2" placeholder="Correo" type="email">
          <input id="password" class="form-control mb-3" placeholder="Contraseña" type="password">
          <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
async function login() {
  const correo = document.getElementById("correo").value;
  const password = document.getElementById("password").value;
  const alerta = document.getElementById("alerta");
  alerta.classList.add("d-none");

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ correo, password })
  });
  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token);
    localStorage.setItem("rol", data.rol);
    localStorage.setItem("nombre", data.nombre);
    window.location = "/dashboard";
  } else {
    alerta.textContent = data.mensaje || "Error al iniciar sesión";
    alerta.classList.remove("d-none");
  }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
