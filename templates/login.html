<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Gestión de Laboratorios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f4f6f9; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
    .login-header { background: linear-gradient(135deg, #0d6efd, #0dcaf0); padding: 30px; text-align: center; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card login-card">
        <div class="login-header">
          <i class="bi bi-pc-display h1"></i>
          <h4 class="mt-2 mb-0">Gestor Lab</h4>
          <small class="text-white-50">UMSA - Informática</small>
        </div>
        <div class="card-body p-4">
          <div id="alerta" class="alert alert-danger d-none py-2 text-center" style="font-size: 0.9rem;"></div>
          
          <div class="input-group mb-3 shadow-sm">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input id="correo" class="form-control border-start-0 ps-0" placeholder="Correo electrónico" type="email">
          </div>
          
          <div class="input-group mb-4 shadow-sm">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input id="password" class="form-control border-start-0 ps-0" placeholder="Contraseña" type="password">
          </div>
          
          <button id="btnIngresar" class="btn btn-primary w-100 py-2 shadow-sm" onclick="login()">
            Ingresar <i class="bi bi-box-arrow-in-right ms-1"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
async function login() {
  const correo = document.getElementById("correo").value;
  const password = document.getElementById("password").value;
  const alerta = document.getElementById("alerta");
  const btn = document.getElementById("btnIngresar");
  
  alerta.classList.add("d-none");

  if (!correo || !password) {
    alerta.textContent = "Por favor, ingresa correo y contraseña.";
    alerta.classList.remove("d-none");
    return;
  }

  const textoOriginal = btn.innerHTML;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Cargando...';
  btn.disabled = true;

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ correo, password })
    });
    
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("rol", data.rol);
      localStorage.setItem("nombre", data.nombre);
      window.location = "/dashboard"; 
    } else {
      alerta.textContent = data.mensaje || "Error al iniciar sesión.";
      alerta.classList.remove("d-none");
    }
  } catch (error) {
    alerta.textContent = "Error de conexión con el servidor.";
    alerta.classList.remove("d-none");
  } finally {
    btn.innerHTML = textoOriginal;
    btn.disabled = false;
  }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
